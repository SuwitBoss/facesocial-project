services:
  # Redis
  redis:
    image: redis:7-alpine
    container_name: facesocial-redis
    ports:
      - "6379:6379"
    restart: unless-stopped
    networks:
      - facesocial-network

  # Face Recognition Service
  face-recognition-service:
    build: ./face-recognition-service
    container_name: facesocial-face-recognition
    environment:
      PORT: 3002
      MILVUS_HOST: milvus
      MILVUS_PORT: 19530
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - "3002:3002"
    volumes:
      # Mount models folder
      - ./face-recognition-service/models:/app/models:ro
    depends_on:
      - redis
    restart: unless-stopped
    networks:
      - facesocial-network

  # Gender and Age Detection Service
  gender-age-service:
    build: ./gender-age-service
    container_name: facesocial-gender-age-service
    ports:
      - "8011:8001"  # เปลี่ยน host port เป็น 8011
    environment:
      - PORT=8001
    volumes:
      - ./gender-age-service/models:/app/models:ro
    restart: unless-stopped
    networks:
      - facesocial-network

  # CCTV Face Recognition Service
  cctv-service:
    build: ./cctv-service
    container_name: facesocial-cctv-service
    ports:
      - "8003:8003"
    environment:
      - PORT=8003
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=your-super-secret-jwt-key-change-this-in-production
      - FACE_SERVICE_URL=http://face-recognition-service:3002
    depends_on:
      - redis
      - face-recognition-service
    restart: unless-stopped
    networks:
      - facesocial-network

networks:
  facesocial-network:
    driver: bridge